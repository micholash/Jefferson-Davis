<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Dungeon Master - TRPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h1>🎲 AI DUNGEON MASTER 🎲</h1>

<div id="authSection" class="auth-container">
  <h2>🎲 AI TRPG - 던전 마스터</h2>
  <p class="auth-subtitle">구글 계정으로 로그인하여 당신의 모험을 시작하세요.</p>
  
  <button id="googleLoginBtn" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/provider/google.svg" alt="Google Logo" />
    Google 계정으로 로그인
  </button>
</div>

  <section id="gameSection" class="hidden">
    <div class="top-info">
      <div>계정: <span id="userEmail" style="color:#d4af37;"></span></div>
      <button class="danger-btn" id="logoutBtn" style="height:32px; padding:0 12px; font-size:13px;">로그아웃</button>
    </div>

    <div id="createCharBox" class="auth-box hidden" style="margin:20px auto; max-width:500px;">
      <h2>캐릭터 시트 생성</h2>
      <input id="charNameInput" type="text" placeholder="영웅의 이름을 적으세요" style="margin-bottom:10px;" />
      <select id="charJobSelect">
        <option value="전사">전사 (고체력 / 근접 전투)</option>
        <option value="마법사">마법사 (저체력 / 강력한 마법)</option>
        <option value="도적">도적 (민첩함 / 기습 및 회피)</option>
      </select>
      <button class="primary-btn" id="createCharBtn" style="margin-top:14px;">던전 입장하기</button>
    </div>

    <div id="mainGamePlay" class="game-layout hidden">
      <div class="char-sheet">
        <h3>🛡️ 캐릭터 정보</h3>
        <div id="lblCharName" class="char-name-display">-</div>
        <div class="status-row"><span>직업:</span> <span id="lblCharJob">-</span></div>
        <div class="status-row"><span>레벨:</span> <span id="lblCharLevel">1</span></div>
        <div class="status-row"><span>경험치:</span> <span id="lblCharExp">0</span></div>
        <div class="status-row"><span>보유 골드:</span> <span id="lblCharGold">0 G</span></div>
        
        <div style="margin-top:20px;">
          <div class="status-row" style="margin-bottom:2px;"><span>체력 (HP):</span> <span id="lblCharHp">100/100</span></div>
          <div class="bar-container"><div id="hpBar" class="hp-bar"></div></div>
        </div>
        
        <button class="danger-btn" id="btnResetChar" style="width:100%; margin-top:30px; height:36px; font-size:13px;">캐릭터 초기화 (사망)</button>
      </div>

      <div class="play-window">
        <div id="statusText" class="status-text">던전 마스터가 이야기를 준비 중입니다...</div>
        
        <div id="imageBox" class="image-box hidden">
          <img id="monsterImage" src="" alt="몬스터 이미지" />
        </div>
      
      <div id="diceWrapper" class="dice-wrapper hidden">
        <div class="dc-badge">목표 난이도 (DC): <span id="dcTargetValue">12</span></div>
      
        <div class="dice-stage">
          <div id="dice3D" class="bg3-dice">
            <svg viewBox="0 0 100 100" class="icosahedron-svg">
              <polygon points="50,5 20,25 50,45" class="d20-face" />
              <polygon points="50,5 50,45 80,25" class="d20-face" />
              <polygon points="20,25 50,45 20,70" class="d20-face" />
              <polygon points="80,25 50,45 80,70" class="d20-face" />
              <polygon points="50,45 20,70 50,95" class="d20-face" />
              <polygon points="50,45 50,95 80,70" class="d20-face" />
              <polygon points="20,25 50,5 5,45" class="d20-face sub-face" />
              <polygon points="20,25 20,70 5,45" class="d20-face sub-face" />
              <polygon points="20,70 50,95 25,95" class="d20-face sub-face" />
              <polygon points="80,25 50,5 95,45" class="d20-face sub-face" />
              <polygon points="80,25 80,70 95,45" class="d20-face sub-face" />
              <polygon points="80,70 50,95 75,95" class="d20-face sub-face" />
            </svg>
            <div id="diceNumberDigit" class="dice-digit">20</div>
          </div>
        </div>
      
        <div class="dice-result-text">🎲 주사위 굴리는 중...</div>
      </div>
      
        <div id="storyBox" class="story-box">여관 문을 열고 들어가자 마스터가 보입니다. 모험을 시작하려면 아래 행동을 고르세요.</div>
        
        <div id="optionsBox" class="options-box"></div>
        <audio id="audioPlayer" autoplay></audio>
      </div>
        <audio id="audioPlayer" autoplay></audio>
      </div>
        <audio id="audioPlayer" autoplay></audio>
      </div>
        
        <audio id="audioPlayer" autoplay></audio>
      </div>
    </div>
  </section>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
